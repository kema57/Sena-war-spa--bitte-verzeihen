<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Für Sena ❤️</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial,sans-serif;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

#screen1,#screen2{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

h1{
color:#ff69b4;
font-size:42px;
text-align:center;
margin-bottom:40px;
}

button{
padding:15px 35px;
font-size:22px;
margin:10px;
border:none;
border-radius:15px;
cursor:pointer;
}

#yes{
background:#4CAF50;
color:white;
}

#no{
background:#ff4d4d;
color:white;
position:absolute;
}

#screen2{
display:none;
background:white;
color:black;
overflow:hidden;
}

#juhu{
font-size:60px;
margin-top:80px;
}

.flower{
position:absolute;
font-size:35px;
animation:fall linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}
</style>

</head>
<body>

<div id="screen1">

<h1>Sena,<br>kannst du mir verzeihen? 🌸</h1>

<div>
<button id="yes">Ja ❤️</button>
<button id="no">Nein</button>
</div>

</div>

<div id="screen2">

<div id="juhu">Freut mich doch sehr 😊, schreib mir jz bitte über Whatsapp deinen Wunsch</div>

</div>

<script>

const no=document.getElementById("no");
const yes=document.getElementById("yes");

no.onclick=()=>{
no.style.left=Math.random()*80+"vw";
no.style.top=Math.random()*80+"vh";
}

yes.onclick=()=>{

document.getElementById("screen1").style.display="none";
document.getElementById("screen2").style.display="flex";

const flowers=["🌸","🌼","🌺","🤍"];

setInterval(()=>{

let f=document.createElement("div");

f.className="flower";

f.innerHTML=flowers[Math.floor(Math.random()*flowers.length)];

f.style.left=Math.random()*100+"vw";

f.style.animationDuration=(3+Math.random()*4)+"s";

document.body.appendChild(f);

setTimeout(()=>f.remove(),7000);

},200);

}

</script>

</body>
</html>
